name: 🔬 Backtesting Config Propuesta

on:
  workflow_dispatch:
    inputs:
      days:
        description: "Días de histórico"
        required: true
        default: "90"
        type: choice
        options: ["30", "60", "90"]
      symbols:
        description: "Pares (separados por espacio)"
        required: true
        default: "BTC-USDT ETH-USDT SOL-USDT BNB-USDT XRP-USDT"
      tf:
        description: "Timeframe"
        required: true
        default: "15m"
        type: choice
        options: ["15m", "1h", "4h"]
      leverage:
        description: "Apalancamiento simulado"
        required: true
        default: "5"
        type: choice
        options: ["3", "5", "10"]

jobs:
  backtest:
    name: "Backtest ${{ inputs.days }}d · ${{ inputs.tf }} · x${{ inputs.leverage }}"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install ccxt ta pandas numpy python-dotenv

      - name: 🔬 Ejecutar backtesting
        env:
          BINGX_API_KEY: ${{ secrets.BINGX_API_KEY }}
          BINGX_API_SECRET: ${{ secrets.BINGX_API_SECRET }}
          # Config propuesta (sobreescribe defaults del bot)
          MIN_SIGNAL_SCORE: "5"
          MIN_SCORE_RATIO: "0.45"
          MIN_RR: "1.3"
          EMA_SPREAD_RANGE_MAX: "0.0008"
          VOL_MIN_GLOBAL: "0.4"
          VOL_SIGNAL_MIN: "0.7"
          ADX_MIN: "15.0"
        run: |
          python backtest_proposed.py \
            --days ${{ inputs.days }} \
            --symbols ${{ inputs.symbols }} \
            --tf ${{ inputs.tf }} \
            --leverage ${{ inputs.leverage }} \
            --csv

      - name: 📊 Listar CSVs generados
        run: ls -lh backtest_*.csv 2>/dev/null || echo "No se generaron CSVs"

      - name: 📤 Subir resultados como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backtest-results-${{ inputs.days }}d-${{ inputs.tf }}
          path: backtest_*.csv
          retention-days: 30
